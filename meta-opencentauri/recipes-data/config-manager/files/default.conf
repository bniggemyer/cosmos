# OpenCentauri COSMOS settings.
# Changes to these settings require rebooting the entire machine to apply.
# Power cycle the machine or run the REBOOT_MACHINE macro after editing.

[ui]
# User interface used on the built in screen. Options: grumpyscreen, none.
screen_ui = grumpyscreen
# User interface used for the webui. Options: mainsail, fluidd.
web_ui = mainsail
# Brightness of the built in screen. Range: 0-100.
screen_brightness = 100

[update]
# Update channel used by the COSMOS updater. Options: stable, nightly.
release = stable
# Check for updates automatically on startup. Options: True, False.
check_for_updates = True

[klipper]
# Keep the camera LED state in sync with the chamber LED.
sync_camera_led_to_chamber_led = False
# Turn the camera LED on automatically when Klipper starts.
camera_led_default_on = True
# Allow printing before the initial calibration checks have passed.
bypass_calibration = False
# Minutes to wait after the bed reaches temperature before starting a print. Range: 0-30 minutes.
heatsoak = 1
# Probe only the print area for each print instead of loading the default bed mesh. Requires nozzle_z_homing to be enabled.
adaptive_mesh = False
# Prime the nozzle near the print area before each print.
adaptive_purge = True
# Use the nozzle and load cell probe for Z homing.
nozzle_z_homing = False
# Drop the bed to this height in millimeters when a print finishes. Range: 0-256.
z_ideal_lifting_distance = 170
# Hotend temperature in Celsius used during the full calibration workflow. Range: 200-300.
full_calibrate_hotend_temperature = 250
# Bed temperature in Celsius used during the full calibration workflow. Range: 40-100.
full_calibrate_bed_temperature = 60
