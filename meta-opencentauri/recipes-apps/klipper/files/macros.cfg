# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# UPDATES WILL RESET THIS FILE. YOUR EDITS WILL BE LOST WHEN UPDATING.
# -----

[gcode_macro _global_var]
variable_target_extruder: 0
variable_retract_amount: 2
variable_extruder_temp:{'probing': 140, 'cleaning': 180, 'loading': 230, 'purging': 250}
variable_fan_state:{'p1': 0.0, 'p2': 0.0, 'p3': 0.0}
variable_z_maximum_lifting_distance: 256
variable_pause_resume_travel_speed: 150
gcode:

[gcode_macro PRINT_START]
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|int %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
    {% set global = printer['gcode_macro _global_var'] %}
    {% set settings = printer['gcode_macro _COSMOS_SETTINGS']|default({}) %}
    {% set heatsoak = settings.heatsoak|default(1)|float %}
    {% set adaptive_mesh = settings.adaptive_mesh|default('false')|lower == 'true' %}
    {% set adaptive_purge = settings.adaptive_purge|default('true')|lower == 'true' %}
    {% set nozzle_z_homing = settings.nozzle_z_homing|default('false')|lower == 'true' %}
    {% set all_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].all_calibrated %}

    {% if not all_calibrated %}  
        SET_DISPLAY_TEXT MSG="Calibration process not completed. Please complete initial calibration first"  
        CANCEL_PRINT  
        RETURN  
    {% endif %}  

    SET_GCODE_VARIABLE MACRO=_global_var VARIABLE=target_extruder VALUE={target_extruder}

    {% if sensor.enabled and not sensor.filament_detected %}
        SET_DISPLAY_TEXT MSG="NO FILAMENT LOADED!"
        CANCEL_PRINT
        RETURN
    {% endif %}

    TURN_OFF_FANS
    BED_MESH_CLEAR
    CLEAR_PAUSE
    G90
    M140 S{target_bed}
    M104 S{global.extruder_temp.probing}
    G28

    {% if nozzle_z_homing %}
        CLEAN_NOZZLE # Nozzle cleaning is not needed if we aren't homing via probe
    {% endif %} 
  
    {% if target_chamber > 0 %}
        SET_DISPLAY_TEXT MSG="Chamber: {target_chamber}c"
        M106 S255
        G0 X128 Y128 Z10 F9000
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
        M107
    {% endif %}
    M190 S{target_bed}

  # rehome after thermal expansion
    SET_DISPLAY_TEXT MSG="Heatsoak: {heatsoak}m"
    G4 P{(heatsoak * 60 * 1000)|int}

    {% if nozzle_z_homing %}
        LOADCELL_Z_HOME
    {% endif %}

    {% if adaptive_mesh %}
        {% if not nozzle_z_homing %}
            SET_DISPLAY_TEXT MSG="Adaptive bed mesh requires nozzle z homing. Please enable nozzle z homing."
            CANCEL_PRINT
            RETURN
        {% endif %}
    
        M109 S{global.extruder_temp.probing}
        SET_DISPLAY_TEXT MSG="Creating adaptive bed mesh"
        SET_GCODE_OFFSET Z=0
        LOAD_CELL_CALIBRATE TARE=TRUE
        BED_MESH_CALIBRATE_BASE ADAPTIVE=1
    {% else %}
        {% if "default" in printer.bed_mesh.profiles %}
            SET_DISPLAY_TEXT MSG="Using default bed mesh"
            BED_MESH_PROFILE LOAD=default
        {% else %}
            SET_DISPLAY_TEXT MSG="NO BED MESH!"
            CANCEL_PRINT
            RETURN
        {% endif %}
    {% endif %}

    {% if adaptive_purge %}
        SMART_PARK
    {% endif %}

    M109 S{target_extruder}
    {% if adaptive_purge %}
        LINE_PURGE
    {% endif %}
    SET_TEMPERATURE_FAN_TARGET temperature_fan=mainboard TARGET=30
    SET_DISPLAY_TEXT ; Clear display text after print start
    G90

[gcode_macro PRINT_END]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set settings = printer['gcode_macro _COSMOS_SETTINGS']|default({}) %}
    {% set z_max = global.z_maximum_lifting_distance|int %}
    {% set z_ideal = settings.z_ideal_lifting_distance|default(170)|int %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
  
    {% if printer.toolhead.homed_axes|lower == "xyz" %}
        G91
        {% if sensor.enabled and sensor.filament_detected %}
            {% if (printer.extruder.target != 0 and (printer.extruder.temperature + 5) >= printer.extruder.target and printer.extruder.temperature >= e_mintemp) %}
                M83
                G1 E-5 F600 # TODO: Decide if retract at the end of a print should be configurable and if so, have a global variable for it.

                {% set x = -2 if printer.gcode_move.position.x > 128 else 2 %}
                {% set y = -2 if printer.gcode_move.position.y > 128 else 2 %}

                G1 X{x} Y{y} E-2 F6000
            {% endif %}
        {% endif %}

        {% if ((printer.gcode_move.position.z + 10) < z_ideal) %}
            G1 Z+{(z_ideal - printer.gcode_move.position.z)} F3000
        {% elif (printer.gcode_move.position.z + 10) < z_max %}
            G1 Z+10 F3000
        {% else %}
            G1 Z+{(z_max - printer.gcode_move.position.z)} F3000
        {% endif %}

        MOVE_TO_TRAY
    {% endif %}
    TURN_OFF_FANS
    TURN_OFF_HEATERS 
    M220 S100
    M221 S100
    CLEAR_PAUSE
    M84
    RESET_VELOCITY_LIMIT
    SET_GCODE_VARIABLE MACRO=_global_var VARIABLE=target_extruder VALUE=0

[gcode_macro CANCEL_PRINT]
description: Cancel active print and park toolhead
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE
    PRINT_END

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set state = params.STATE|default('normal') %}
    {% set retract_amount = global.retract_amount|float %}
    {% set z_lift_max = global.z_maximum_lifting_distance|int %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
    {% set pos = printer.gcode_move.position %}

    {% if printer.pause_resume.is_paused %}
        RESPOND MSG="Printer already paused"
        RETURN
    {% endif %}  

    SET_DISPLAY_TEXT MSG="Pausing"

    _SAVE_FAN_STATE
    PAUSE_BASE

    {% if ((printer.extruder.temperature + 5) >= printer.extruder.target) and printer.extruder.can_extrude and sensor.enabled and sensor.filament_detected  %}
        M83
        G1 E-{retract_amount} F300
    {% endif %}

    {% if printer.toolhead.homed_axes|lower == "xyz" %}
        {% set zpos = printer.gcode_move.position.z %}
        G91
        {% if (zpos + 5) < z_lift_max %}
            G1 Z+5 F3000
        {% else %}
            G1 Z+{(z_lift_max - zpos)} F3000
        {% endif %}
        G90
    {% endif %}

    {% if state == 'filament_change' %}
        SET_DISPLAY_TEXT MSG="Paused for filament change"
        UNLOAD_FILAMENT
        LOAD_FILAMENT EXTRUDER_TEMP={printer.extruder.target}
    {% elif state == 'runout' %}
        # Runout pause: keep heater on and prompt user to insert filament
        RESPOND MSG="Paused for runout"
        PURGE
        LOAD_FILAMENT EXTRUDER_TEMP={printer.extruder.target}
    {% else %}
        # Keep heater on so resume can prime quickly
        M104 S{global.extruder_temp.probing}
        MOVE_TO_TRAY
    {% endif %}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set sensor = printer['filament_switch_sensor filament_sensor'] %}
    {% set extruder_target_temp = printer['gcode_macro _global_var'].target_extruder %}

    # If filament sensor is enabled require filament present before resuming
    {% if sensor.enabled and not sensor.filament_detected %}
        RESPOND TYPE=command MSG="Please insert filament before resuming."
        RETURN
    {% endif %}
    SET_DISPLAY_TEXT
    # Ensure nozzle heated to target before attempting to prime/extrude
    MOVE_TO_TRAY
    M109 S{extruder_target_temp}
    M83
    G1 E50 F300 ; Extrude 50mm to prime. FIXME: This value might require some tweaking. Maybe make configurable.
    KICK
    _RESTORE_FAN_STATE
    RESUME_BASE


[gcode_macro PURGE]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
    # Move to purge position
    MOVE_TO_TRAY

    {% if printer.extruder.target < 180 or not printer.extruder.can_extrude %}
        ; Heat nozzle to 250°C and wait
        M104 S{global.extruder_temp.purging} ; Heat nozzle to purging temp
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={global.extruder_temp.purging} MAXIMUM={global.extruder_temp.purging+5}
    {% endif %}

    # Purge filament (8 cycles)
    G92 E0                          ; Reset extruder position
    M106 S0                       ; Turn off part cooling fan
    {% for purge in range(4) %}
        G1 E25 F300                     ; Extrude 13mm at medium speed
        G1 E10 F150                      ; Extrude 2mm slowly (ensure flow)
        M400                            ; Wait for completion
    {% endfor %}

    KICK
    MOVE_TO_TRAY

[gcode_macro CLEAN_NOZZLE]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set toolhead_target = printer.extruder.target|int %}
    BED_MESH_CLEAR
    M104 S{global.extruder_temp.cleaning}
    {% if printer.toolhead.homed_axes != "xyz" %}
       G28
    {% endif %}
    G90

    # Move to tray
    MOVE_TO_TRAY    
    M104 S{global.extruder_temp.cleaning}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={global.extruder_temp.cleaning} MAXIMUM={global.extruder_temp.cleaning+5}
    M104 S{global.extruder_temp.probing}
    M106 S255
    # Wipe
    G1 F9000
    {% for wipes in range(4) %}
        {% for i in range(8) %}
            {% set x = 187 - (i * 2) %}
            {% set y = 265 if i % 2 == 0 else 263 %}
            G1 X{x} Y{y}
        {% endfor %}
        G1 X187
    {% endfor %}
    # Move a 2mm on Y
    G1 Y263
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={global.extruder_temp.probing} 

    G1 F9000
    {% for wipes in range(4) %}
        {% for i in range(8) %}
            {% set x = 187 - (i * 2) %}
            {% set y = 263 if i % 2 == 0 else 265 %}
            G1 X{x} Y{y}
        {% endfor %}
        G1 X187
    {% endfor %}
    # Add some clearance
    G1 Y250
    # Clear command queue
    M104 S{toolhead_target}
    M107 
    M400
    SET_DISPLAY_TEXT

[gcode_macro MOVE_TO_TRAY]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    {% if printer.gcode_move.position.x > 201.5 and printer.gcode_move.position.x < 202.5 and printer.gcode_move.position.y > 264.5 and printer.gcode_move.position.y < 265.5 %}
        RETURN ; Already at the tray
    {% endif %}

    G90                             ; Absolute positioning
    G0 X202 F12000
    G0 Y250 F12000             ; Move near to the try
    G0 Y265 F1200                 ; Move slowly back to the tray

    M400                            ; Wait for movements to complete

[gcode_macro KICK]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set retract_amount = global.retract_amount|float %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        {action_raise_error("Printer not homed")}
    {% endif %}

    {% if printer.extruder.target < 180 or not printer.extruder.can_extrude %}
        {action_raise_error("Extruder not hot enough to kick")}
    {% endif %}

    G90 ; Absolute positioning
    M83 ; E relative

    MOVE_TO_TRAY ; Move to the tray
    G1 E-{retract_amount} F300 ; Retract slightly to reduce pressure during kick
    M106 S255 ; Full blast fan to solidify plastic
    G4 P3000 ; Wait 3 seconds for fan to do its work
    G1 X186 F8000 ; Kick left
    M106 S0 ; Turn off fan

    G1 Y250 F6000 ; Exit

    M400 ; Wait for movements to complete

[gcode_macro _LOAD_FILAMENT_STEP_PUSH]
gcode:
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Loading filament. Please wait..."
    RESPOND TYPE=command MSG="action:prompt_show"
    {% if printer.extruder.target < 180 or (printer.extruder.temperature + 5 < printer.extruder.target) or not printer.extruder.can_extrude %}
        {action_raise_error("Extruder not hot enough to load filament")}
    {% endif %}
    M83                            ; Relative extrusion mode
    G92 E0                         ; Reset extruder position
    G1 E70 F420
    M400

    RESPOND TYPE=command MSG="action:prompt_begin Loading Filament"
    RESPOND TYPE=command MSG="action:prompt_text Load completed. Do you want to purge more?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Purge more|_LOAD_FILAMENT_STEP_PUSH"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done|_LOAD_FILAMENT_STEP_DONE"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _LOAD_FILAMENT_STEP_DONE]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% if printer.pause_resume.is_paused %}
        M104 S{global.target_extruder}
        RESPOND TYPE=command MSG="action:prompt_begin Finalizing filament load"
        RESPOND TYPE=command MSG="action:prompt_text Filament loaded. Resume when ready."
        RESPOND TYPE=command MSG="action:prompt_show"
        G4 P3000
        SET_DISPLAY_TEXT MSG="Filament loaded. Resume when ready."
        _CLOSE_PROMPT
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_begin Finalizing filament load"
        RESPOND TYPE=command MSG="action:prompt_text Cleaning nozzle and turning off heaters. Please wait."
        RESPOND TYPE=command MSG="action:prompt_show"

        CLEAN_NOZZLE
        M104 S0

        _CLOSE_PROMPT
    {% endif %}
   
[gcode_macro LOAD_FILAMENT]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set target = params.EXTRUDER_TEMP | default(global.extruder_temp.loading) | int %}
    _CLOSE_PROMPT

    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Wait for hotend to heat up"
    RESPOND TYPE=command MSG="action:prompt_show"

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    MOVE_TO_TRAY                    ; Move to the tray
    M104 S{target}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target} MAXIMUM={target+5}
    M107                       ; Turn off part cooling fan (full speed)
    M400
    
    RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
    RESPOND TYPE=command MSG="action:prompt_text Insert filament all the way into extruder before continuing"
    RESPOND TYPE=command MSG="action:prompt_footer_button LOAD|_LOAD_FILAMENT_STEP_PUSH"
    RESPOND TYPE=command MSG="action:prompt_footer_button CANCEL|_CLOSE_PROMPT"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
                      ; Absolute positioning
    CUT_FILAMENT                            ; Wait for movements to complete

    MOVE_TO_TRAY
    COLD_EXTRUDE HEATER=extruder ENABLE=1                    ; Move to the tray
    G1 E-30 F600
    COLD_EXTRUDE HEATER=extruder ENABLE=0
    G0 Y250
    M400                            ; Wait for movements to complete

[gcode_macro CUT_FILAMENT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G90
    G0 Y20 F8000
    G0 X255 F8000
    G0 Y4 F1200
    G0 Y20 F1200
    M400

[homing_override]
axes: xyz # This forces the z position to be at 0 when we start homing, so we can move the Z up before homing.
set_position_z: 0
gcode:
    BED_MESH_CLEAR
    G90
    G0 Z5 F1200 ; 5 up zhop
    {% if not rawparams %}
        G28 Y
        G28 X
        G28 Y
        G0 X128 Y128 F4800
        G28 Z
    {% else %}
        {% if 'X' in rawparams %}
            G28 X
        {% endif %}
        {% if 'Y' in rawparams %}
            G28 Y
        {% endif %}
        {% if 'Z' in rawparams %}
            G28 Z
        {% endif %}
    {% endif %}

    {% if "default" in printer.bed_mesh.profiles %}
        BED_MESH_PROFILE LOAD=default
    {% endif %}

[gcode_macro LOADCELL_Z_HOME]
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set toolhead_target = printer.extruder.target|int %}
    
    M104 S{global.extruder_temp.probing}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 ; Home if necessary
    {% endif %}
    BED_MESH_CLEAR
    M109 S{global.extruder_temp.probing}

    G91
    G0 Z5 F600 ; Move down a Z to get some clearance

    {% for _ in range(2) %}
      G90
      G1 X120 Y-1 F9000
      PROBE HOME=Z SAMPLES=3 SAMPLES_TOLERANCE=0.05 BAD_PROBE_RETRIES=3 BAD_PROBE_STRATEGY=RETRY ; Cleaning passes
      G91
      G0 X4 F600
      G0 Z0.8 F300 ; Using pressure of bending the build plate to squish filament
      {% for _ in range(5) %}
        G0 X2 F9000
        G0 Z-1 F300
        G4 P300
        G0 Z1 F300
      {% endfor %}
    {% endfor %}

    G91
    G0 Z4 F600 ; Move down a Z to get some clearance
    G90
    G1 X128 Y128 F9000

    PROBE HOME=Z SAMPLES=3 SAMPLES_TOLERANCE=0.05 BAD_PROBE_STRATEGY=RETRY ; Pass 3, final pass

    G91 
    G0 Z5 F600                       
    G90

    M104 S{toolhead_target} ; Restore temp

[gcode_macro _SAVE_Z_OFFSET]
gcode:
  {% set probe_z_offset = printer.configfile.settings["load_cell_probe"].z_offset %}
  {% set z_offset = ((printer.probe.last_z_result | float) - probe_z_offset) | round(7) %}
  RESPOND MSG="Z offset is off by {z_offset}"
  SET_GCODE_OFFSET Z_ADJUST={z_offset}
  Z_OFFSET_APPLY_ENDSTOP

[gcode_macro Z_OFFSET_APPLY_ENDSTOP]
rename_existing: Z_OFFSET_APPLY_ENDSTOP_BASE
gcode:
  {% set settings = printer['gcode_macro _COSMOS_SETTINGS']|default({}) %}
  {% set nozzle_z_homing = settings.nozzle_z_homing|default('false')|lower == 'true' %}

  {% if nozzle_z_homing %}
    { action_raise_error("Z_OFFSET_APPLY_ENDSTOP is not supported when nozzle z homing is enabled.") }
  {% else %}
    Z_OFFSET_APPLY_ENDSTOP_BASE {rawparams}
  {% endif %}

[gcode_macro CALIBRATE_Z_OFFSET]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}

    G91
    G0 Z20 F600
    G28 Z ; Home Z with optical
    M400
    SET_GCODE_OFFSET Z=0 ; imortant to avoid error stacking up on several retries
    BED_MESH_CLEAR
    G90
    G1 X128 Y128 F9000
    PROBE HOME=Z SAMPLES=3 SAMPLES_TOLERANCE=0.05 BAD_PROBE_STRATEGY=RETRY ; Pass 3, final pass
    M400
    _SAVE_Z_OFFSET
    G91
    G0 Z5 F600

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set settings = printer['gcode_macro _COSMOS_SETTINGS']|default({}) %}
    {% set bed_temp = params.BED_TEMP|default(printer.heater_bed.target if printer.heater_bed.target > 0 else 60)|float %}
    {% set nozzle_z_homing = settings.nozzle_z_homing|default('false')|lower == 'true' %}
    SET_GCODE_OFFSET Z=0
    M140 S{bed_temp}
    G28
    CLEAN_NOZZLE
    M190 S{bed_temp}
    M104 S{global.extruder_temp.probing}
    G4 P60000
    LOADCELL_Z_HOME 

    M109 S{global.extruder_temp.probing}
    TURN_OFF_FANS
    LOAD_CELL_CALIBRATE TARE=TRUE
    BED_MESH_CALIBRATE_BASE {rawparams}

    {% if not nozzle_z_homing %}
        CALIBRATE_Z_OFFSET
    {% endif %}

[gcode_macro PROBE]
rename_existing: PROBE_BASE
gcode:
    LOAD_CELL_CALIBRATE TARE=TRUE
    PROBE_BASE {rawparams}

[gcode_macro SCREWS_TILT_CALCULATE]
rename_existing: SCREWS_TILT_CALCULATE_BASE
gcode:
    {% set global = printer['gcode_macro _global_var'] %}
    {% set bed_temp = params.BED_TEMP|default(60)|int %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                         ; Home if necessary
    {% endif %}
    
    BED_MESH_CLEAR
    M190 S{bed_temp}
    M109 S{global.extruder_temp.probing}
    M400
    G28
    CLEAN_NOZZLE
    SCREWS_TILT_CALCULATE_BASE


[gcode_macro _IDLE_TIMEOUT]
gcode:
    {% if printer.print_stats.state == "paused" %}
        RESPOND MSG="PAUSED"
    {% else %}
        M84
        TURN_OFF_HEATERS
        TURN_OFF_FANS
        RESPOND MSG="Idle timeout reached, turning off heaters, steppers and fans!"
    {% endif %}

[gcode_macro TURN_OFF_FANS]
gcode:
    M107
    SET_FAN_SPEED FAN=aux_fan SPEED=0
    SET_FAN_SPEED FAN=case_fan SPEED=0
    SET_TEMPERATURE_FAN_TARGET temperature_fan=mainboard
    RESPOND MSG="ALL FANS OFF!"

[gcode_macro _SAVE_FAN_STATE]
gcode:
    {% set fan_state = {
        'p1': printer.fan.speed|float,
        'p2': printer['fan_generic aux_fan'].speed|float,
        'p3': printer['fan_generic case_fan'].speed|float
    } %}

    SET_GCODE_VARIABLE MACRO=_global_var VARIABLE=fan_state VALUE="{fan_state}"

[gcode_macro _RESTORE_FAN_STATE]
gcode:
    {% set fan_state = printer['gcode_macro _global_var'].fan_state %}

    M106 P1 S{(fan_state.p1|float * 255)|int}
    M106 P2 S{(fan_state.p2|float * 255)|int}
    M106 P3 S{(fan_state.p3|float * 255)|int}

[gcode_macro M600]
gcode:
    PAUSE STATE=filament_change

[gcode_macro M106]
rename_existing: M006
gcode:
  {% set index = params.P|default(1)|int %}
  {% set speed = params.S|default(255)|int %}
  {% set nspeed = speed/255 %}

  {% if index == 1 %} # Part cooling fan
    M006 S{speed}
  {% elif index == 2 %} # Aux cooling fan
    SET_FAN_SPEED FAN=aux_fan SPEED={nspeed}
  {% elif index == 3 %} # Exhaust fan
    SET_FAN_SPEED FAN=case_fan SPEED={nspeed}
  {% else %}
    {action_raise_error("Invalid fan index")}
  {% endif %}

[gcode_macro M107]
rename_existing: M007
gcode:
  {% set index = params.P|default(1)|int %}
  M106 P{index} S0


[gcode_macro _SHOW_PROMPT]
gcode:
    {% set title = params.TITLE|default('Please wait') %}
    {% set message = params.MESSAGE %}
    {% set esc_title = title|replace('"','\\"') %}
    {% set esc_message = message|replace('"','\\"') %}

    RESPOND TYPE=command MSG="action:prompt_begin {esc_title}"
    RESPOND TYPE=command MSG="action:prompt_text {esc_message}"

    # Yes this is a hack. I don't want to hear about it.
    {% if title == "Update Available" %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Update Now|_UPDATE_COSMOS|warning"
    {% endif %}

    RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss|RESPOND TYPE=command MSG=action:prompt_end"

    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CLOSE_PROMPT]
gcode:
  RESPOND TYPE=command MSG="action:prompt_end"

[gcode_macro SET_DISPLAY_TEXT]
rename_existing: SET_DISPLAY_TEXT_BASE
gcode:
    {% set message = params.MSG|default('') %}

    {% if message %}
        {action_respond_info(message)}
    {% endif %}

    SET_DISPLAY_TEXT_BASE MSG="{message}"


[gcode_macro M729]
gcode:
    SET_DISPLAY_TEXT MSG="Use COSMOS start/end machine gcode"
    M112

[gcode_macro M8213]
gcode:
    SET_DISPLAY_TEXT MSG="Use COSMOS start/end machine gcode"
    M112

