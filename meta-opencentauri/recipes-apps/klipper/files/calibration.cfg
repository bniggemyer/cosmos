# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# UPDATES WILL RESET THIS FILE. YOUR EDITS WILL BE LOST WHEN UPDATING.
# -----

[gcode_macro _CHECK_CALIBRATION_VARS]
variable_shaper_calibrated: False
variable_bed_mesh_calibrated: False
variable_load_cell_calibrated: False
variable_extruder_pid_calibrated: False
variable_all_calibrated: False
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set bypass_calibration = settings.bypass_calibration|default(false)|lower == 'true' %}

  {% if bypass_calibration %}
    SET_DISPLAY_TEXT MSG="Calibration bypassed."
    SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=all_calibrated VALUE=True
    RETURN
  {% endif %}

  {% set shaper_freq_x = printer.configfile.settings.input_shaper.shaper_freq_x|default(0)|float %}
  {% set shaper_freq_y = printer.configfile.settings.input_shaper.shaper_freq_y|default(0)|float %}
  {% set shaper_calibrated = shaper_freq_x > 0 and shaper_freq_y > 0 %}
  {% set bed_mesh_default_exists = 'bed_mesh default' in printer.configfile.settings %} 
  {% set load_cell_probe_reference_tare_counts = printer.configfile.settings.load_cell_probe.reference_tare_counts|default(71000)|int %}
  {% set load_cell_probe_calibrated = load_cell_probe_reference_tare_counts != 71000  %}
  {% set extruder_pid_kp = printer.configfile.settings.extruder.pid_kp %}
  {% set extruder_control_type = printer.configfile.settings.extruder.control %}
  {% set extruder_pid_calibrated = extruder_control_type != 'pid' or extruder_pid_kp != 24.860427 %}
  {% set all_calibrated = shaper_calibrated and bed_mesh_default_exists and load_cell_probe_calibrated and extruder_pid_calibrated %}

  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=shaper_calibrated VALUE={shaper_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=bed_mesh_calibrated VALUE={bed_mesh_default_exists}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=load_cell_calibrated VALUE={load_cell_probe_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=extruder_pid_calibrated VALUE={extruder_pid_calibrated}
  SET_GCODE_VARIABLE MACRO=_CHECK_CALIBRATION_VARS VARIABLE=all_calibrated VALUE={all_calibrated}

[delayed_gcode check_vars]
initial_duration: 1
gcode:
  _CHECK_CALIBRATION_VARS

[gcode_macro CHECK_CALIBRATION]
gcode:
  {% set shaper_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].shaper_calibrated %}
  {% set bed_mesh_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].bed_mesh_calibrated %}
  {% set load_cell_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].load_cell_calibrated %}
  {% set extruder_pid_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].extruder_pid_calibrated %}
  {% set all_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].all_calibrated %}

  RESPOND TYPE=command MSG="action:prompt_begin Welcome to COSMOS!"

  {% if shaper_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text OK! Resonance Compensation calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text X Resonance Compensation not calibrated"
  {% endif %}

  {% if bed_mesh_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text OK! Default bed mesh created"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text X Default bed mesh missing"
  {% endif %}

  {% if load_cell_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text OK! Load cell calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text X Load cell not calibrated"
  {% endif %}

  {% if extruder_pid_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text OK! Extruder PID calibrated"
  {% else %}
    RESPOND TYPE=command MSG="action:prompt_text X Extruder PID not calibrated"
  {% endif %}

  {% if not all_calibrated %}
    RESPOND TYPE=command MSG="action:prompt_text The machine is not fully calibrated. Please calibrate your machine before printing. Refer to our documentation for more details."
  {% endif %}

  RESPOND TYPE=command MSG="action:prompt_footer_button Close|_CLOSE_PROMPT"
  RESPOND TYPE=command MSG="action:prompt_footer_button Calibrate All|_CALIBRATE_ALL_STEP_1|warning"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_ALL_STEP_1]
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set hotend_temperature = settings.full_calibrate_hotend_temperature|int %}
  {% set bed_temperature = settings.full_calibrate_bed_temperature|int %}

  RESPOND TYPE=command MSG="action:prompt_begin Calibrate all"
  RESPOND TYPE=command MSG="action:prompt_text The screen and camera will be disabled during resonance compensation calibration. When the calibration is complete, you will be prompted to save the updated configuration."
  RESPOND TYPE=command MSG="action:prompt_text The bed mesh will be calibrated with a bed temperature of {bed_temperature}C. The extruder PID will be calibrated with a hotend temperature of {hotend_temperature}C."
  RESPOND TYPE=command MSG="action:prompt_text Please clear out the chamber and bed of any foreign objects and click Ready."
  RESPOND TYPE=command MSG="action:prompt_footer_button Back|CHECK_CALIBRATION"
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|_CALIBRATE_ALL_STEP_2|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_ALL_STEP_2]
gcode:
  _CLOSE_PROMPT
  G28
  G0 Z128 F1500
  M400
  G4 P500
  LOAD_CELL_CALIBRATE
  G4 P500
  TARE
  RESPOND TYPE=command MSG="action:prompt_begin Calibrate load cells"
  RESPOND TYPE=command MSG="action:prompt_text Please place a (mostly) full 1kg filament spool on top of the bed. Alternatively, put roughly 1150g on the bed. Afterwards, click Ready."
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|_CALIBRATE_ALL_STEP_3|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_ALL_STEP_3]
gcode:
  _CLOSE_PROMPT
  CALIBRATE GRAMS=1150
  ACCEPT
  RESPOND TYPE=command MSG="action:prompt_begin Calibration"
  RESPOND TYPE=command MSG="action:prompt_text Please remove the spool/weight from the bed. Afterwards, click Ready to proceed with the rest of the calibrations."
  RESPOND TYPE=command MSG="action:prompt_footer_button Ready|_CALIBRATE_ALL_STEP_4|primary"
  RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _CALIBRATE_ALL_STEP_4]
gcode:
  {% set settings = printer["gcode_macro _COSMOS_SETTINGS"]|default({}) %}
  {% set hotend_temperature = settings.full_calibrate_hotend_temperature|int %}
  {% set bed_temperature = settings.full_calibrate_bed_temperature|int %}

  _CLOSE_PROMPT

  SET_DISPLAY_TEXT MSG="Performing shaper calibration"
  RUN_SHELL_COMMAND CMD=CAMERA_STOP
  RUN_SHELL_COMMAND CMD=GUI_STOP
  G28
  M400
  SHAPER_CALIBRATE AXIS=X
  G4 P1000
  SHAPER_CALIBRATE AXIS=Y
  G4 P1000
  RUN_SHELL_COMMAND CMD=GUI_START
  RUN_SHELL_COMMAND CMD=CAMERA_START
  
  SET_DISPLAY_TEXT MSG="Performing extruder PID calibration"
  MOVE_TO_TRAY
  PID_CALIBRATE HEATER=extruder TARGET={hotend_temperature}
  CLEAN_NOZZLE
  M400

  SET_DISPLAY_TEXT MSG="Performing probe z-offset & bed mesh calibration"
  G90
  G1 X128 Y128 F6000
  BED_MESH_CALIBRATE BED_TEMP={bed_temperature}

  _SAVE_CONFIG_PROMPT

[delayed_gcode open_oobe]
initial_duration: 2
gcode:
  {% set all_calibrated = printer["gcode_macro _CHECK_CALIBRATION_VARS"].all_calibrated %}
  
  {% if not all_calibrated %}
    CHECK_CALIBRATION
  {% endif %}

[gcode_macro SAVE_CONFIG]
rename_existing: SAVE_CONFIG_BASE
gcode:
  _CLOSE_PROMPT
  G4 P1000 ; Wait 1 second to ensure prompt is closed
  SAVE_CONFIG_BASE

[gcode_macro _SAVE_CONFIG_PROMPT]
description: Save the current configuration with a user prompt
gcode:
  RESPOND TYPE=command MSG="action:prompt_begin Save Configuration"
  RESPOND TYPE=command MSG="action:prompt_text Do you want to save the current configuration? This will save all current settings and will overwrite previous configurations."
  RESPOND TYPE=command MSG="action:prompt_text If you'd like to check the current settings before saving, please dismiss this prompt. You can save the current configuration by running the SAVE_CONFIG command directly."
  RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss, Save later|_CLOSE_PROMPT"
  RESPOND TYPE=command MSG="action:prompt_footer_button Save|SAVE_CONFIG|warning"
  RESPOND TYPE=command MSG="action:prompt_show"
