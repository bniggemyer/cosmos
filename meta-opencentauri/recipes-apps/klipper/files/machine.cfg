# -----
# PLEASE DO NOT EDIT THIS FILE. EDIT printer.cfg INSTEAD.
# UPDATES WILL RESET THIS FILE. YOUR EDITS WILL BE LOST WHEN UPDATING.
# -----

[mcu]
serial: /dev/ttyRPMSG0
restart_method: command

[mcu bed]
serial: /dev/ttyS4
baud: 250000
restart_method: command
is_non_critical: true

[mcu hotend]
serial: /dev/serial/by-path/platform-4101400.usb-usb-0:1:1.0
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 9

# kinematics: limited_corexy
# max_x_accel:10000
# max_y_accel:5000
# max_velocity: 500


[gcode_arcs]
resolution: 0.5

[pause_resume]

[exclude_object]

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 1800

[virtual_sdcard]
path: /etc/klipper/gcodes

[danger_options]
multi_mcu_trsync_timeout: 0.03

[stepper_x]
step_pin: PE8
dir_pin: !PE7
enable_pin: !PE10
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 256
position_max: 256
position_min: -2
homing_speed: 80
homing_retract_dist: 20
rotation_distance: 39.872
homing_accel:5000

[tmc2209 stepper_x]
tx_pin: PE9
uart_pin: PE6
uart_address: 0
interpolate: true
run_current: 1
home_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 130
diag_pin: !PG4


[stepper_y]
step_pin: PE14
dir_pin: !PE13
enable_pin: !PE15
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2
position_max: 265
position_min: -2
homing_speed: 80
homing_retract_dist: 30
rotation_distance: 39.872
homing_accel:5000

[tmc2209 stepper_y]
tx_pin: PE9
uart_pin: PE6
interpolate: true
run_current: 1.0
home_current: 0.8
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 130
diag_pin: !PF6


[stepper_z]
step_pin: PG3
dir_pin: !PG2
enable_pin: !PG1
endstop_pin: PG8
rotation_distance: 8
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 4
position_max: 258
position_min: -4
homing_speed: 8
homing_retract_dist: 10
homing_retract_speed: 6
second_homing_speed: 2


[tmc2209 stepper_z]
tx_pin: PE9
uart_pin: PE6
interpolate: true
run_current: 0.8
uart_address: 1
sense_resistor: 0.1
driver_sgthrs: 130
stealthchop_threshold: 99999


[extruder]
step_pin: hotend:PC13
dir_pin: hotend:PC14
enable_pin: !hotend:PC15
heater_pin: hotend:PB6
sensor_pin: hotend:PA3
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 52:10
rotation_distance: 28.8 #could be 27.3 needs more testing 28.8 default
nozzle_diameter: 0.4
filament_diameter: 1.75
sensor_type: hotend_thermistor
min_temp: 5
max_temp: 335
min_extrude_temp: 180
pressure_advance: 0.04
pressure_advance_smooth_time: 0.04
max_extrude_only_distance: 150
max_extrude_cross_section: 5
control: pid
pid_Kp: 24.860427
pid_Ki: 2.702253
pid_Kd: 57.178292

[tmc2209 extruder]
tx_pin: hotend:PC6
uart_pin: hotend:PC7
interpolate: true
run_current: 0.7
uart_address: 3
sense_resistor: 0.1

[verify_heater extruder]

[thermistor hotend_thermistor]
temperature1: 25
resistance1: 100000
beta: 4300

[heater_fan extruder]
pin: hotend:PC8
tachometer_pin: hotend:PA1
tachometer_poll_interval: 0.001

[fan]
pin: hotend:PB5
tachometer_pin: hotend:PA0


[lis2dw]
spi_speed: 5000000
cs_pin: hotend:PA4
spi_bus: spi1
axes_map: x,z,-y

[input_shaper]
damping_ratio_x: 0.06
damping_ratio_y: 0.082

[resonance_tester]
probe_points: 128,128,20
accel_chip: lis2dw
min_freq: 10
max_freq: 100
accel_per_hz: 100
hz_per_sec: 2


[heater_bed]
heater_pin: PG13
sensor_pin: PB14
sensor_type: Generic 3950
min_temp: 5
max_temp: 125
control: pid
pid_Kp: 46.504839
pid_Ki: 1.453276
pid_Kd: 372.038710

[verify_heater heater_bed]

[bed_mesh]
speed: 150
horizontal_move_z: 2
mesh_min: 10,10
mesh_max: 246,246
probe_count: 9,9
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 3
zero_reference_position: 128, 128

[load_cell_probe]
sensor_type: load_cell_fusion
sensors: hx71x sg0, hx71x sg1, hx71x sg2, hx71x sg3
samples: 2
samples_tolerance_retries: 3
speed: 2
sample_retract_dist: 1
lift_speed: 5
counts_per_gram: 29.11
reference_tare_counts: 71000
z_offset: -0.15
samples_result: median
trigger_force: 50
drop_first_result: true

[hx71x sg0]
chip: hx711
dout_pin: bed:PB14
sclk_pin: bed:PB13
sample_rate: 80
gain: A-128

[hx71x sg1]
chip: hx711
dout_pin: bed:PC8
sclk_pin: bed:PC7
sample_rate: 80
gain: A-128

[hx71x sg2]
chip: hx711
dout_pin: bed:PB15
sclk_pin: bed:PC6
sample_rate: 80
gain: A-128

[hx71x sg3]
chip: hx711
dout_pin: bed:PA8
sclk_pin: bed:PC9
sample_rate: 80
gain: A-128


[filament_switch_sensor filament_sensor]
switch_pin: PC0
pause_on_runout: false
debounce_delay: 1
runout_distance: 770
runout_gcode:
  RESPOND MSG="Refill filament"
  PAUSE STATE=runout
immediate_runout_gcode:
  RESPOND MSG="Ran out of filament, using remaining filament in PTFE"
insert_gcode:
  RESPOND MSG="Filament is inserted"


[led case]
white_pin: PG15
initial_WHITE: 1

[led hotend]
white_pin: hotend:PC9

[temperature_sensor chamber]
sensor_pin: PB13
sensor_type: Generic 3950
min_temp: 5
max_temp: 125

[fan_generic aux_fan]
pin: PG17

[fan_generic case_fan]
pin: PG18


[temperature_sensor mcu_toolhead]
sensor_type: temperature_mcu
sensor_mcu: hotend

[temperature_sensor mcu_bed]
sensor_type: temperature_mcu
sensor_mcu: bed


[temperature_fan mainboard]
pin: PG16
tachometer_pin: PG6
min_temp: 5
max_temp: 80
target_temp: 60
min_speed: 0
sensor_type: temperature_host
control: pid
pid_Kp: 2
pid_Ki: 5
pid_Kd: 0.5


[screws_tilt_adjust]
screw1: 231, 25
screw1_name: front right screw
screw2: 231, 225
screw2_name: rear right screw
screw3: 31, 225
screw3_name: rear left screw
screw4: 31, 25
screw4_name: front left screw
horizontal_move_z: 5
speed: 300
screw_thread: CCW-M3
