[default_macros]
cooldown: TURN_OFF_HEATERS
extrude: _GUPPYSCREEN_EXTRUDE EXTRUDER_TEMP={} EXTRUDE_LEN={} SPEED={}
retract: _GUPPYSCREEN_RETRACT EXTRUDER_TEMP={} EXTRUDE_LEN={} SPEED={}
load_filament: LOAD_FILAMENT EXTRUDER_TEMP={}
unload_filament: UNLOAD_FILAMENT EXTRUDER_TEMP={}

[ui]
invert_z_icon: false
prompt_emergency_stop: true
# specify -1 for never
display_sleep_sec: 600
# log levels are info, debug, trace
log_level: info
display_rotate: 0
# for displaying the current chamber temp in printing ui
chamber_temp_sensor: temperature_sensor chamber
# comma-separated extruder panel button values
extruder_temp_presets: 200, 220, 240, 260, 280
extruder_temp_default: 220
extruder_length_presets: 5, 10, 20, 50, 100
extruder_length_default: 10
extruder_speed_presets: 1, 2, 5, 10, 20
extruder_speed_default: 5

# blue = primary_colour: 0x2196F3, secondary_colour: 0xF44336
# green = primary_colour: 0x4CAF50, secondary_colour: 0xF44336
# pink = primary_colour: 0xFEC5E5, secondary_colour: 0xE91E63
# purple = primary_colour: 0x9C27B0, secondary_colour: 0xF44336
# red = primary_colour: 0xF44336, secondary_colour: 0xF44336
# yellow = primary_colour: 0xFFEB3B, secondary_colour: 0xF44336
[theme]
primary_colour: 0x2196F3
secondary_colour: 0xF44336

[moonraker]
host: 127.0.0.1
port: 80

[commands]
factory_reset_cmd: /usr/bin/factory-reset
gui_restart_cmd: /etc/init.d/gui-switcher restart
cosmos_update_cmd: /usr/bin/update-cosmos
switch_to_stock_cmd: /usr/bin/switch-to-oc-patched
support_zip_cmd: /usr/bin/generate-support-zip

[fan "fan"]
display_name: Part_Cooling

[fan "fan_generic aux_fan"]
display_name: Aux_Cooling

[fan "fan_generic case_fan"]
display_name: Case_Exhaust

[led "led hotend"]
display_name: Led_Hotend
pwm: true

[led "led case"]
display_name: Led_Case
pwm: true

[monitored_sensor "extruder"]
display_name: Extruder
color: red
controllable: true

[monitored_sensor "heater_bed"]
display_name: Bed
color: purple
controllable: true

[monitored_sensor "temperature_sensor chamber"]
display_name: Chamber
color: blue
controllable: false
